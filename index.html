<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
  <title>Feria de Sofy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <!-- PWA: instalable a pantalla de inicio, abre standalone sin la barra del navegador -->
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="theme-color" content="#B4531F">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>
<body>
  <!-- Sprite de iconos del chrome (trazo, heredan currentColor vía .icon) -->
  <svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
    <symbol id="i-vender" viewBox="0 0 24 24"><path d="M5.5 7.5h13l-1.1 12a1.6 1.6 0 0 1-1.6 1.5H8.2a1.6 1.6 0 0 1-1.6-1.5l-1.1-12z"/><path d="M9 10.5v-4a3 3 0 0 1 6 0v4"/></symbol>
    <symbol id="i-inventario" viewBox="0 0 24 24"><path d="M4 8l8-4 8 4v8l-8 4-8-4V8z"/><path d="M4 8l8 4 8-4"/><path d="M12 12v8"/></symbol>
    <symbol id="i-ideas" viewBox="0 0 24 24"><path d="M12 3a6 6 0 0 1 4 10.5c-.8.7-1 1.5-1 2.5h-6c0-1-.2-1.8-1-2.5A6 6 0 0 1 12 3z"/><path d="M9.5 19.5h5"/><path d="M10.5 22h3"/></symbol>
    <symbol id="i-reportes" viewBox="0 0 24 24"><path d="M5 20v-8"/><path d="M12 20V5"/><path d="M19 20v-5"/><path d="M3.5 20.5h17"/></symbol>
    <symbol id="i-atras" viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"/></symbol>
    <symbol id="i-chevron" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></symbol>
    <symbol id="i-mas" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></symbol>
    <symbol id="i-menos" viewBox="0 0 24 24"><path d="M5 12h14"/></symbol>
    <symbol id="i-cerrar" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></symbol>
    <symbol id="i-trash" viewBox="0 0 24 24"><path d="M4.5 6.5h15"/><path d="M8 6.5V5a1.5 1.5 0 0 1 1.5-1.5h5A1.5 1.5 0 0 1 16 5v1.5"/><path d="M6.5 6.5l.8 13a1.6 1.6 0 0 0 1.6 1.5h6.2a1.6 1.6 0 0 0 1.6-1.5l.8-13"/><path d="M10 10.5v6M14 10.5v6"/></symbol>
    <symbol id="i-editar" viewBox="0 0 24 24"><path d="M4 20l1-4L16.5 4.5a2.1 2.1 0 0 1 3 3L8 19l-4 1z"/><path d="M14.5 6.5l3 3"/></symbol>
    <symbol id="i-anular" viewBox="0 0 24 24"><path d="M8 5L3.5 9.5 8 14"/><path d="M3.5 9.5H15a5.5 5.5 0 0 1 0 11h-4"/></symbol>
    <symbol id="i-quitar" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.5"/><path d="M8.5 12h7"/></symbol>
    <symbol id="i-traer" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.5"/><path d="M12 8.5v7M8.5 12h7"/></symbol>
    <symbol id="i-densidad" viewBox="0 0 24 24"><rect x="4" y="4" width="6.5" height="6.5" rx="1.3"/><rect x="13.5" y="4" width="6.5" height="6.5" rx="1.3"/><rect x="4" y="13.5" width="6.5" height="6.5" rx="1.3"/><rect x="13.5" y="13.5" width="6.5" height="6.5" rx="1.3"/></symbol>
  </svg>

  <div id="connection-banner" class="banner banner--offline hidden">📡 Sin conexión — no se pueden confirmar ventas hasta reconectar</div>

  <section id="login-gate" class="screen">
    <div class="login-card">
      <h1>🌸 Feria de Sofy</h1>
      <p class="card__hint">Tu puesto de feria, en el celular</p>
      <form id="login-form">
        <label class="field">
          <span class="field__label">Tu correo</span>
          <input id="login-email" class="input" type="email" placeholder="tu@correo.com" required autocomplete="email" />
          <span class="field__hint">Te mandamos un enlace para entrar, sin contraseña.</span>
        </label>
        <button type="submit" class="btn btn--primary btn--block">Enviarme el enlace</button>
      </form>
      <p id="login-message" class="login-msg hidden"></p>
    </div>
  </section>

  <section id="feria-selector" class="screen hidden">
    <h1>🌸 Feria de Sofy</h1>
    <p>¿En cuál feria vas a trabajar?</p>
    <div id="feria-cards" class="feria-cards"></div>
    <button id="btn-nueva-feria" class="btn btn--primary"><svg class="icon" aria-hidden="true"><use href="#i-mas"/></svg> Nueva feria</button>
    <button id="btn-reporte-general" class="btn btn--quiet">📊 Reporte general</button>
  </section>

  <section id="reporte-general" class="screen hidden">
    <header class="navbar">
      <button class="navbar__back" id="btn-volver-selector" aria-label="Volver a la lista de ferias">
        <svg class="icon" aria-hidden="true"><use href="#i-atras"/></svg> Ferias
      </button>
      <h1 class="navbar__title">Reporte general</h1>
      <span class="navbar__trailing" aria-hidden="true"></span>
    </header>
    <div class="feria-scroll" id="reporte-general-content"></div>
  </section>

  <section id="feria-view" class="screen hidden" data-tab="vender">
    <header class="navbar">
      <button class="navbar__back" id="btn-cambiar-feria" aria-label="Volver a la lista de ferias">
        <svg class="icon" aria-hidden="true"><use href="#i-atras"/></svg> Ferias
      </button>
      <h1 class="navbar__title" id="feria-titulo"></h1>
      <span class="navbar__trailing" aria-hidden="true"></span>
    </header>

    <div class="feria-scroll">
      <main id="tab-vender" class="tab-panel"></main>
      <main id="tab-inventario" class="tab-panel hidden"></main>
      <main id="tab-ideas" class="tab-panel hidden"></main>
      <main id="tab-reportes" class="tab-panel hidden"></main>
    </div>

    <button id="carrito-dock" class="carrito-dock" type="button" aria-haspopup="dialog" aria-label="Abrir carrito para cobrar"></button>
    <div id="carrito-backdrop" class="carrito-backdrop hidden"></div>
    <aside id="carrito-sheet" class="carrito-sheet" role="dialog" aria-modal="true" aria-label="Carrito de venta" tabindex="-1"></aside>

    <nav class="tabbar" aria-label="Secciones de la feria">
      <button class="tabbar__item is-active" data-tab="vender" aria-current="page">
        <svg class="icon tabbar__icon" aria-hidden="true"><use href="#i-vender"/></svg>
        <span class="tabbar__label">Vender</span>
      </button>
      <button class="tabbar__item" data-tab="inventario">
        <svg class="icon tabbar__icon" aria-hidden="true"><use href="#i-inventario"/></svg>
        <span class="tabbar__label">Inventario</span>
      </button>
      <button class="tabbar__item" data-tab="ideas">
        <svg class="icon tabbar__icon" aria-hidden="true"><use href="#i-ideas"/></svg>
        <span class="tabbar__label">Ideas</span>
      </button>
      <button class="tabbar__item" data-tab="reportes">
        <svg class="icon tabbar__icon" aria-hidden="true"><use href="#i-reportes"/></svg>
        <span class="tabbar__label">Reportes</span>
      </button>
    </nav>
  </section>

  <script type="module" src="js/app.js"></script>
</body>
</html>
